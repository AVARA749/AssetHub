<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetHub Admin | Master Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(30, 41, 59, 0.5);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #14b8a6;
            --primary-glow: rgba(20, 184, 166, 0.3);
            --secondary: #6366f1;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--card-border);
            border-radius: 24px;
        }

        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--card-border);
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: var(--glass-blur);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--card-border);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        .hidden {
            display: none;
        }

        #dashboard-view {
            padding: 50px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 30px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--primary);
        }

        .form-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }

        /* Grid layout for property list */
        .property-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .property-item {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .property-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .property-item img.loaded {
            opacity: 1;
        }

        .shimmer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.05) 50%,
                    rgba(255, 255, 255, 0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo">
                    <div class="logo-icon"><i data-lucide="shield-check"></i></div>
                    AssetHub Admin
                </a>
                <div id="auth-actions" class="hidden">
                    <button class="btn btn-outline" onclick="logout()"><i data-lucide="log-out"></i> Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Auth Section -->
        <section id="auth-view" style="padding: 100px 0;">
            <div class="glass-card" style="max-width: 500px; margin: 0 auto; padding: 50px; text-align: center;">
                <div id="admin-status-icon" class="logo-icon" style="margin: 0 auto 30px; width: 60px; height: 60px;"><i
                        data-lucide="lock"></i></div>
                <h2 id="auth-title" class="section-title" style="font-size: 2rem; margin-bottom: 10px;">Admin Login</h2>
                <p id="auth-subtitle" style="color: var(--text-dim); margin-bottom: 40px;">Please authenticate to access
                    the master controls.</p>

                <div id="auth-form-container">
                    <!-- Dynamic Auth Form -->
                </div>
            </div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboard-view" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1>Administrator Dashboard</h1>
                <button class="btn btn-primary" onclick="showAddProperty()"><i data-lucide="plus"></i> Add New
                    Property</button>
            </div>

            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <p class="input-group label">Active Listings</p>
                    <div id="stat-active" class="stat-value">0</div>
                </div>
                <div class="glass-card stat-card">
                    <p class="input-group label">Total Verified Assets</p>
                    <div id="stat-total" class="stat-value">0</div>
                </div>
            </div>

            <h2 style="margin-bottom: 20px;">Current Inventory</h2>
            <div id="admin-property-list" class="property-list">
                <!-- Properties will be listed here -->
            </div>
        </section>

        <!-- Add Property Section -->
        <section id="add-property-view" class="hidden" style="padding: 50px 0;">
            <div class="glass-card form-section">
                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                    <button class="btn btn-outline" style="padding: 10px;" onclick="showDashboard()"><i
                            data-lucide="arrow-left"></i></button>
                    <h2>List New Asset</h2>
                </div>

                <form id="property-form" onsubmit="handlePropertySubmit(event)">
                    <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
                        <div class="input-group">
                            <label>Asset Title</label>
                            <input type="text" id="p-title" placeholder="e.g. Luxury Villa in Karen" required>
                        </div>
                        <div class="input-group">
                            <label>Category</label>
                            <select id="p-category" required>
                                <option value="Land">Land</option>
                                <option value="House">House</option>
                                <option value="Car">Car</option>
                                <option value="Truck">Truck</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Assets Media (Images & Videos)</label>
                        <input type="file" id="p-files" accept="image/*,video/*" multiple required
                            style="padding: 10px;">
                        <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 5px;">Select multiple files to
                            showcase your asset (JPG, PNG, WebP, MP4).</p>
                    </div>

                    <div class="input-group">
                        <label>Asset Description</label>
                        <textarea id="p-description" rows="5" placeholder="Detailed description of the asset..."
                            required></textarea>
                    </div>

                    <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
                        <div class="input-group">
                            <label>Price (KES)</label>
                            <input type="number" id="p-price" placeholder="15000000" required>
                        </div>
                        <div class="input-group">
                            <label>County</label>
                            <input type="text" id="p-county" placeholder="Nairobi" required>
                        </div>
                    </div>

                    <div class="stats-grid" style="grid-template-columns: 1fr 1fr;">
                        <div class="input-group">
                            <label>Town / Area</label>
                            <input type="text" id="p-town" placeholder="Karen" required>
                        </div>
                        <div class="input-group">
                            <label>Contact Phone</label>
                            <input type="tel" id="p-contact" placeholder="2547XXXXXXXX" required>
                        </div>
                    </div>

                    <button class="btn btn-primary" type="submit" style="width: 100%; padding: 20px; margin-top: 20px;">
                        <i data-lucide="check-circle"></i> Complete Listing
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        const API_BASE = 'http://localhost:5000/api';
        const BACKEND_URL = 'http://localhost:5000';
        let token = localStorage.getItem('assethub_token');

        function getFileUrl(url) {
            if (!url) return '';
            if (url.startsWith('http')) return url;
            return `${BACKEND_URL}${url}`;
        }

        // --- View Navigation ---
        function showView(viewId) {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('add-property-view').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');

            if (viewId !== 'auth-view') {
                document.getElementById('auth-actions').classList.remove('hidden');
            } else {
                document.getElementById('auth-actions').classList.add('hidden');
            }
        }

        function showDashboard() {
            showView('dashboard-view');
            fetchStats();
            fetchProperties();
        }

        function showAddProperty() {
            showView('add-property-view');
        }

        // --- Auth Logic ---
        async function checkAdminStatus() {
            try {
                const res = await fetch(`${API_BASE}/admin/status`);
                const { initialized } = await res.json();
                renderAuthForm(initialized);
            } catch (err) {
                console.error('API connection failed. Ensure backend is running.');
            }
        }

        function renderAuthForm(isInitialized) {
            const container = document.getElementById('auth-form-container');
            const title = document.getElementById('auth-title');
            const icon = document.getElementById('admin-status-icon');

            if (!isInitialized) {
                title.textContent = 'Master Setup';
                icon.innerHTML = '<i data-lucide="sparkles"></i>';
                container.innerHTML = `
                    <form onsubmit="handleAuth(event, true)">
                        <div class="input-group"><label>Full Name</label><input type="text" id="fullname" required></div>
                        <div class="input-group"><label>Email</label><input type="email" id="email" required></div>
                        <div class="input-group"><label>Phone</label><input type="tel" id="phone" required></div>
                        <div class="input-group"><label>Password</label><input type="password" id="password" required></div>
                        <div class="input-group"><label>Invite Code</label><input type="text" id="invite" placeholder="ASSETHUB_2024" required></div>
                        <button class="btn btn-primary" type="submit" style="width: 100%;">Setup Admin</button>
                    </form>
                `;
            } else {
                title.textContent = 'Admin Login';
                icon.innerHTML = '<i data-lucide="lock"></i>';
                container.innerHTML = `
                    <form onsubmit="handleAuth(event, false)">
                        <div class="input-group"><label>Email</label><input type="email" id="email" required></div>
                        <div class="input-group"><label>Password</label><input type="password" id="password" required></div>
                        <button class="btn btn-primary" type="submit" style="width: 100%;">Authenticate</button>
                    </form>
                `;
            }
            lucide.createIcons();
        }

        async function handleAuth(e, isRegister) {
            e.preventDefault();
            const body = isRegister ? {
                name: document.getElementById('fullname').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                inviteCode: document.getElementById('invite').value
            } : {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const url = isRegister ? '/admin/register' : '/admin/login';

            try {
                const res = await fetch(API_BASE + url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);

                if (isRegister) {
                    alert('Admin setup successful! Please login.');
                    checkAdminStatus();
                } else {
                    token = data.token;
                    localStorage.setItem('assethub_token', token);
                    showDashboard();
                }
            } catch (err) { alert(err.message); }
        }

        function logout() {
            localStorage.removeItem('assethub_token');
            token = null;
            showView('auth-view');
            checkAdminStatus();
        }

        // --- Data Logic ---
        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/admin/dashboard`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('stat-total').textContent = data.stats.totalListings;
                    document.getElementById('stat-active').textContent = data.stats.activeListings;
                }
            } catch (err) { console.error(err); }
        }

        async function fetchProperties() {
            try {
                const res = await fetch(`${API_BASE}/admin/properties`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                renderPropertyList(data.properties);
            } catch (err) { console.error(err); }
        }

        function renderPropertyList(list) {
            const container = document.getElementById('admin-property-list');
            container.innerHTML = list.map(p => `
                <div class="glass-card property-item" style="position:relative; overflow:hidden;">
                    <div class="shimmer" id="adm-shimmer-${p.id}"></div>
                    <img src="${getFileUrl(p.thumbnail)}" loading="lazy"
                        onload="this.classList.add('loaded'); document.getElementById('adm-shimmer-${p.id}').remove();">
                    <div style="font-weight:800; margin-top:10px;">${p.title}</div>
                    <div style="color:var(--primary); font-size:0.8rem; font-weight:800;">KES ${parseFloat(p.price).toLocaleString()}</div>
                    <div style="color:var(--text-dim); font-size:0.7rem;"><i data-lucide="map-pin" style="width:10px;"></i> ${p.town}, ${p.county}</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function handlePropertySubmit(e) {
            e.preventDefault();
            const formData = new FormData();

            formData.append('title', document.getElementById('p-title').value);
            formData.append('description', document.getElementById('p-description').value);
            formData.append('category', document.getElementById('p-category').value);
            formData.append('listing_type', 'Sale');
            formData.append('price', document.getElementById('p-price').value);
            formData.append('viewing_fee', '0');
            formData.append('county', document.getElementById('p-county').value);
            formData.append('town', document.getElementById('p-town').value);
            formData.append('area', document.getElementById('p-town').value);
            formData.append('contact_phone', document.getElementById('p-contact').value);

            const fileInput = document.getElementById('p-files');
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append('files', fileInput.files[i]);
            }

            try {
                const res = await fetch(`${API_BASE}/properties`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                if (!res.ok) throw new Error('Failed to list asset');
                alert('✅ Asset Listed Successfully! It is now live on the marketplace.');
                showDashboard();
            } catch (err) { alert(err.message); }
        }

        // Init
        if (token) showDashboard();
        else checkAdminStatus();

    </script>
</body>

</html>
